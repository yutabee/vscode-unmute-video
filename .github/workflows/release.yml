name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'npm'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - name: Package
        run: npx vsce package --no-dependencies -o unmute-video.vsix
      - name: Verify webview script is packaged
        run: unzip -l unmute-video.vsix | grep -q 'extension/media/player.js'
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --packagePath unmute-video.vsix -p "$VSCE_PAT"
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish unmute-video.vsix -p "$OVSX_PAT"
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: unmute-video.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true
