name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install ffmpeg (for audio extraction tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npx --yes @vscode/vsce package --no-dependencies -o extension.vsix
