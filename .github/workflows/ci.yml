name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install ffmpeg (for audio extraction tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm run lint
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm run compile
      - run: npm test
      - run: npx vsce package --no-dependencies -o extension.vsix
      - name: Verify webview script is packaged
        run: unzip -l extension.vsix | grep -q 'extension/media/player.js'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.node-version == '22.x'
        with:
          name: unmute-video-vsix
          path: extension.vsix
          if-no-files-found: error
